services:

  invidious:
    image: quay.io/invidious/invidious:master
    container_name: invidious
    restart: unless-stopped
    ports:
      - ${INVIDIOUS_PORT}:3000
    environment:
      # Please read the following file for a comprehensive list of all available
      # configuration options and their associated syntax:
      # https://github.com/iv-org/invidious/blob/master/config/config.example.yml
      INVIDIOUS_CONFIG: |
        db:
          dbname: invidious
          user: kemal
          password: kemal
          host: invidious-db
          port: 5432
        check_tables: true
        invidious_companion:
        # URL used for the internal communication between invidious and invidious companion
        # There is no need to change that except if Invidious companion does not run on the same docker compose file.
        - private_url: "http://companion:8282/companion"
        # (public) URL used for the communication between your browser and invidious companion
        # IF you are using a reverse proxy OR accessing invidious from an external IP then you NEED to change this value
        # Please consult for more doc: https://github.com/unixfox/invidious/blob/invidious-companion/config/config.example.yml#L57-L88
        # And make sure to add the routes from the post install when using a reverse proxy!
          public_url: "http://nettools:8282/companion"
        # IT is NOT recommended to use the same key as HMAC KEY. Generate a new key!
        # Generate with: pwgen 16 1
        invidious_companion_key: CHANGEME_COMPANION_KEY
        # external_port:
        # domain:
        # https_only: false
        # statistics_enabled: false
        # Generate with: pwgen 16 1
        hmac_key: CHANGEME_HMAC_KEY
    healthcheck:
      test: wget -nv --tries=1 --spider http://127.0.0.1:3000/api/v1/stats || exit 1
      interval: 30s
      timeout: 5s
      retries: 2
    logging:
      options:
        max-size: "1G"
        max-file: "4"
    depends_on:
      - invidious-db

  companion:
    image: quay.io/invidious/invidious-companion:latest
    container_name: invidious-companion
    environment:
    # Must match invidious_companion_key above
       - SERVER_SECRET_KEY=CHANGEME_COMPANION_KEY
    restart: unless-stopped
    # Remove "127.0.0.1:" if used from an external IP
    ports:
      - 8282:8282
    logging:
      options:
        max-size: "1G"
        max-file: "4"
    cap_drop:
      - ALL
    read_only: true
    # cache for youtube library
    volumes:
      - companioncache:/var/tmp/youtubei.js:rw
    security_opt:
      - no-new-privileges:true

  invidious-db:
    image: docker.io/library/postgres:14
    container_name: invidious-db
    restart: unless-stopped
    volumes:
      - postgresdata:/var/lib/postgresql/data
      - ${CONFIG_DIR}/.invidious/config/sql:/config/sql
      - ${CONFIG_DIR}/sources/invidious/docker/init-invidious-db.sh:/docker-entrypoint-initdb.d/init-invidious-db.sh
    environment:
      POSTGRES_DB: invidious
      POSTGRES_USER: kemal
      POSTGRES_PASSWORD: kemal
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]

volumes:
  postgresdata:
  companioncache:
x-logging: &logging
  driver: json-file
  options:
    max-size: 10m
    max-file: "3"

services:
  cups:
    build: .
    container_name: cups
    network_mode: host
    restart: unless-stopped
    logging: *logging
    environment:
      PRINTER_URI: ${PRINTER_URI}
      CANON_PRINTER_URI: ${CANON_PRINTER_URI:-}
      DEFAULT_PRESET: ${DEFAULT_PRESET:-photo}
      CUPS_ADMIN_USER: ${CUPS_ADMIN_USER:-admin}
      CUPS_ADMIN_PASSWORD: ${CUPS_ADMIN_PASSWORD:-}
    volumes:
      # spool intentionally not persisted: queue recreation on boot orphans
      # pending jobs anyway, and stale jobs spam errors at startup
      - ./data/log:/var/log/cups
      # keep the self-signed cert stable across rebuilds so clients
      # don't re-prompt trust every time
      - ./data/ssl:/etc/cups/ssl
      - ./presets:/presets
    healthcheck:
      test: lpstat -r || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

  webui:
    build: ./webui
    container_name: cups-webui
    # host network so lp/lpstat reach cupsd on localhost:631
    network_mode: host
    restart: unless-stopped
    logging: *logging
    environment:
      CUPS_SERVER: localhost:631
      WEBUI_PORT: ${WEBUI_PORT:-8631}
      # queried directly (ipptool) for ink levels
      PRINTER_URI: ${PRINTER_URI}
      # basic auth for the print page; leave password empty to disable
      WEBUI_USER: ${WEBUI_USER:-print}
      WEBUI_PASSWORD: ${WEBUI_PASSWORD:-}
    volumes:
      # drop a Canon .icm/.icc here to enable soft-proofed previews
      - ./icc:/icc:ro
      # print history (history.jsonl)
      - ./data/webui:/data
    depends_on:
      cups:
        condition: service_healthy
    healthcheck:
      test: curl -fsS http://localhost:${WEBUI_PORT:-8631}/healthz || exit 1
      interval: 30s
      timeout: 5s
      retries: 3

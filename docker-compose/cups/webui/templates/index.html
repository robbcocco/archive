<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>print</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 26rem; margin: 3rem auto; padding: 0 1rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  h1 { font-size: 1.2rem; margin: 0; }
  #drop {
    border: 2px dashed #8888; border-radius: 12px;
    padding: 2.5rem 1rem; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  #drop.over { border-color: #4a9eff; background: #4a9eff22; }
  #drop.hasfile { border-style: solid; border-color: #3c3; padding: .8rem; }
  #drop img, #drop embed {
    max-width: 100%; max-height: 240px; border-radius: 6px; display: block;
    margin: 0 auto;
  }
  #drop embed { width: 100%; height: 240px; }
  #drop figcaption {
    font-size: .8rem; opacity: .7; margin-top: .4rem; word-break: break-all;
  }
  select, input, button {
    font: inherit; padding: .5rem .6rem; border-radius: 8px;
    border: 1px solid #8886; width: 100%;
  }
  label { font-size: .8rem; opacity: .7; display: block; margin-bottom: .2rem; }
  .row { display: flex; gap: .6rem; }
  .row > div { flex: 1; }
  details { border: 1px solid #8884; border-radius: 8px; padding: .6rem; }
  details > div { display: flex; flex-direction: column; gap: .6rem; margin-top: .6rem; }
  button {
    background: #4a9eff; color: white; border: none; cursor: pointer;
    padding: .7rem; font-weight: 600;
  }
  button:disabled { opacity: .4; cursor: default; }
  #status { min-height: 1.2rem; font-size: .9rem; white-space: pre-wrap; }
  #status.err { color: #e55; }
  #status.ok { color: #3a3; }
</style>
</head>
<body>
<h1>🖨 print</h1>

<div id="drop">drop a file here<br>or click to choose</div>
<input type="file" id="file" hidden accept=".pdf,.jpg,.jpeg,.png,.tif,.tiff,.txt">

<div class="row">
  <div>
    <label for="queue">queue</label>
    <select id="queue"></select>
  </div>
  <div>
    <label for="copies">copies</label>
    <input id="copies" type="number" min="1" max="99" value="1">
  </div>
  <div>
    <label for="orientation-requested">orientation</label>
    <select id="orientation-requested">
      <option value="">auto</option>
      <option value="3">portrait</option>
      <option value="4">landscape</option>
    </select>
  </div>
</div>

<details>
  <summary>options (queue preset applies unless overridden)</summary>
  <div>
    <div>
      <label for="media">media</label>
      <select id="media">
        <option value="">preset default</option>
        <option>A4</option>
        <option>A5</option>
        <option>Letter</option>
        <option>PhotoPlusGloss2</option>
        <option value="4x6.Photo">4x6 photo</option>
      </select>
    </div>
    <div>
      <label for="sides">sides</label>
      <select id="sides">
        <option value="">preset default</option>
        <option value="one-sided">one-sided</option>
        <option value="two-sided-long-edge">two-sided (long edge)</option>
        <option value="two-sided-short-edge">two-sided (short edge)</option>
      </select>
    </div>
    <div>
      <label for="print-quality">quality</label>
      <select id="print-quality">
        <option value="">preset default</option>
        <option value="3">draft</option>
        <option value="4">normal</option>
        <option value="5">best</option>
      </select>
    </div>
    <div>
      <label for="print-color-mode">color</label>
      <select id="print-color-mode">
        <option value="">preset default</option>
        <option value="color">color</option>
        <option value="monochrome">black &amp; white</option>
      </select>
    </div>
    <div>
      <label for="fit-to-page">scaling</label>
      <select id="fit-to-page">
        <option value="">as-is</option>
        <option value="true">fit to page</option>
      </select>
    </div>
  </div>
</details>

<button id="go" disabled>print</button>
<div id="status"></div>

<script>
const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");
const go = document.getElementById("go");
const status = document.getElementById("status");
let file = null;

fetch("/queues").then(r => r.json()).then(qs => {
  const sel = document.getElementById("queue");
  qs.forEach(q => sel.add(new Option(q, q)));
  if (qs.length === 0) show("no queues found on the cups server", true);
});

let previewUrl = null;

function setFile(f) {
  file = f;
  if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
  drop.classList.toggle("hasfile", !!f);
  go.disabled = !f;
  show("");

  if (!f) {
    drop.innerHTML = "drop a file here<br>or click to choose";
    return;
  }
  drop.textContent = "";
  const fig = document.createElement("figure");
  fig.style.margin = 0;
  if (f.type.startsWith("image/")) {
    previewUrl = URL.createObjectURL(f);
    const img = document.createElement("img");
    img.src = previewUrl;
    fig.appendChild(img);
  } else if (f.type === "application/pdf") {
    previewUrl = URL.createObjectURL(f);
    const emb = document.createElement("embed");
    emb.src = previewUrl + "#toolbar=0";
    emb.type = "application/pdf";
    fig.appendChild(emb);
  }
  const cap = document.createElement("figcaption");
  cap.textContent = f.name + " (" + (f.size / 1024 / 1024).toFixed(1) + " MB)";
  fig.appendChild(cap);
  drop.appendChild(fig);
}

drop.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => setFile(fileInput.files[0]));
["dragover", "dragenter"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => setFile(e.dataTransfer.files[0]));

function show(msg, err) {
  status.textContent = msg;
  status.className = err ? "err" : "ok";
}

go.addEventListener("click", async () => {
  if (!file) return;
  const fd = new FormData();
  fd.append("file", file);
  fd.append("queue", document.getElementById("queue").value);
  fd.append("copies", document.getElementById("copies").value);
  for (const k of ["media", "sides", "print-quality", "print-color-mode", "fit-to-page", "orientation-requested"])
    fd.append(k, document.getElementById(k).value);

  go.disabled = true;
  show("sending…");
  try {
    const r = await fetch("/print", { method: "POST", body: fd });
    const j = await r.json();
    if (j.ok) { show("✓ " + j.message); setFile(null); }
    else show(j.error || "failed", true);
  } catch (e) {
    show("network error: " + e, true);
  }
  go.disabled = !file;
});
</script>
</body>
</html>

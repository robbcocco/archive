<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>print</title>
<style>
  :root {
    color-scheme: light dark;
    --accent: light-dark(#316dca, #4493f8);
    --accent-hover: light-dark(#2760b8, #5a9ff9);
    --bg: light-dark(#f6f8fa, #0d1117);
    --card: light-dark(#ffffff, #161b22);
    --field: light-dark(#f6f8fa, #21262d);
    --border: light-dark(#d8dee4, #30363d);
    --text: light-dark(#1f2328, #e6edf3);
    --dim: light-dark(#59636e, #8d96a0);
    --ok: light-dark(#1a7f37, #3fb950);
    --err: light-dark(#d1242f, #f85149);
    --mono: ui-monospace, "SF Mono", Menlo, Consolas, monospace;
  }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, "Segoe UI", sans-serif;
    font-size: .92rem; color: var(--text); background: var(--bg);
    max-width: 62rem; margin: 0 auto; padding: 0 1rem 3rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  header {
    display: flex; align-items: center; gap: 1rem; flex-wrap: wrap;
    padding: 1rem .2rem; border-bottom: 1px solid var(--border);
  }
  h1 {
    font-size: 1rem; font-weight: 600; margin: 0; letter-spacing: -.01em;
    display: flex; align-items: center; gap: .5rem;
  }
  h1 svg { width: 1.1rem; height: 1.1rem; stroke: var(--dim); }
  h2 {
    font-size: .72rem; font-weight: 600; margin: 0 0 .8rem;
    text-transform: uppercase; letter-spacing: .05em; color: var(--dim);
  }

  #ink { display: flex; gap: .4rem; flex-wrap: wrap; margin-left: auto; }
  .pill {
    display: inline-flex; align-items: center; gap: .35rem;
    font-size: .72rem; padding: .26rem .6rem; border-radius: 6px;
    border: 1px solid var(--border); background: var(--card);
    font-variant-numeric: tabular-nums;
  }
  .pill i {
    width: .6rem; height: .6rem; border-radius: 50%;
    background: var(--c, #888); border: 1px solid #0002;
  }
  .pill.low { color: var(--err); border-color: var(--err); font-weight: 600; }

  main { display: grid; grid-template-columns: 1.1fr 1fr; gap: 1rem; align-items: start; }
  @media (max-width: 780px) { main { grid-template-columns: 1fr; } }

  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 12px; padding: 1.1rem;
  }

  #drop {
    border: 1.5px dashed var(--border); border-radius: 10px;
    padding: 1rem; text-align: center; cursor: pointer; min-height: 13rem;
    display: flex; flex-direction: column; align-items: center;
    justify-content: center; gap: .8rem;
    transition: border-color .15s, background .15s;
  }
  #drop.over { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 8%, transparent); }
  #drop.hasfile { border-style: solid; cursor: default; }
  #placeholder { color: var(--dim); line-height: 1.7; font-size: .85rem; }
  #placeholder svg {
    width: 1.8rem; height: 1.8rem; stroke: var(--dim); display: block; margin: 0 auto .3rem;
  }

  #paper {
    position: relative; background: #fff; border-radius: 1px;
    box-shadow: 0 0 0 1px #00000014, 0 8px 24px -10px #00000059;
    display: flex; align-items: center; justify-content: center;
    height: 300px; max-width: 100%; padding: var(--m, 10px);
    transition: aspect-ratio .2s, width .2s, padding .2s;
  }
  #paper.bare { background: none; box-shadow: none; padding: 0; height: auto; }
  #paper img { max-width: 100%; max-height: 100%; object-fit: contain; display: block; }
  #paper.bare img { max-height: 300px; border-radius: 6px; }
  #copies-badge {
    position: absolute; top: -.55rem; right: -.55rem;
    background: var(--accent); color: #fff; font-size: .7rem; font-weight: 700;
    padding: .18rem .5rem; border-radius: 99px; box-shadow: 0 1px 4px #0003;
  }
  #caption { font-size: .76rem; color: var(--dim); word-break: break-all; }
  #effective { display: flex; flex-wrap: wrap; gap: .3rem; justify-content: center; }
  #effective span {
    font-size: .68rem; padding: .16rem .5rem; border-radius: 99px;
    background: var(--field); border: 1px solid var(--border); color: var(--dim);
  }

  #chips { display: flex; flex-wrap: wrap; gap: .4rem; margin-top: .9rem; }
  .chip {
    display: inline-flex; align-items: center; gap: .4rem; max-width: 100%;
    font-size: .76rem; padding: .3rem .65rem; border-radius: 6px;
    background: var(--field); border: 1px solid var(--border); cursor: pointer;
    transition: border-color .15s;
  }
  .chip:hover { border-color: var(--accent); }
  .chip.sel { border-color: var(--accent); background: color-mix(in srgb, var(--accent) 10%, var(--card)); }
  .chip span { overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  .chip b { font-weight: 400; opacity: .55; cursor: pointer; padding: 0 .1rem; }
  .chip b:hover { opacity: 1; color: var(--err); }

  .col { display: flex; flex-direction: column; gap: .9rem; }
  .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
  select, input, button {
    font: inherit; padding: .45rem .6rem; border-radius: 6px;
    border: 1px solid var(--border); width: 100%;
    background: var(--field); color: var(--text);
    transition: border-color .15s, box-shadow .15s;
  }
  select:hover, input:hover { border-color: color-mix(in srgb, var(--border) 40%, var(--dim)); }
  select:focus-visible, input:focus-visible {
    outline: none; border-color: var(--accent);
    box-shadow: 0 0 0 3px color-mix(in srgb, var(--accent) 22%, transparent);
  }
  label {
    font-size: .68rem; font-weight: 600; text-transform: uppercase;
    letter-spacing: .04em; color: var(--dim);
    display: block; margin-bottom: .3rem;
  }
  button.primary {
    background: var(--accent); color: #fff; border: 1px solid transparent;
    cursor: pointer; padding: .65rem; font-weight: 600;
    transition: background .15s;
  }
  button.primary:hover:not(:disabled) { background: var(--accent-hover); }
  button:disabled { opacity: .45; cursor: default; }
  #status {
    font-size: .85rem; white-space: pre-wrap;
    padding: .55rem .75rem; border-radius: 6px; border: 1px solid transparent;
  }
  #status:empty { display: none; }
  #status.err {
    color: var(--err); border-color: color-mix(in srgb, var(--err) 35%, transparent);
    background: color-mix(in srgb, var(--err) 7%, transparent);
  }
  #status.ok {
    color: var(--ok); border-color: color-mix(in srgb, var(--ok) 35%, transparent);
    background: color-mix(in srgb, var(--ok) 7%, transparent);
  }

  ul.plain { list-style: none; margin: 0; padding: 0; display: flex; flex-direction: column; gap: .4rem; }
  ul.plain li {
    display: flex; align-items: center; gap: .6rem; font-size: .82rem;
    padding: .45rem .65rem; background: var(--field);
    border: 1px solid var(--border); border-radius: 6px;
  }
  ul.plain .grow { flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  ul.plain .dim { color: var(--dim); font-size: .74rem; white-space: nowrap; }
  ul.plain .mono { font-family: var(--mono); font-size: .78rem; }
  ul.plain button {
    width: auto; padding: .22rem .6rem; font-size: .74rem; cursor: pointer;
    background: var(--card); border: 1px solid var(--border); color: inherit;
  }
  ul.plain button:hover { border-color: var(--accent); color: var(--accent); }
  ul.plain button.danger:hover { border-color: var(--err); color: var(--err); }
  details.opts { border: 1px solid var(--border); border-radius: 8px; padding: .6rem .7rem; }
  details.opts > summary { cursor: pointer; font-size: .78rem; color: var(--dim); }
  details.opts > .grid2 { margin-top: .7rem; }
  details.card > summary {
    cursor: pointer; font-size: .72rem; font-weight: 600;
    text-transform: uppercase; letter-spacing: .05em; color: var(--dim);
  }
  details.card > ul { margin-top: .8rem; }
  .empty { color: var(--dim); font-size: .82rem; }
</style>
</head>
<body>
<header>
  <h1>
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M6 9V3h12v6M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><path d="M6 14h12v7H6z"/></svg>
    Print Server
  </h1>
  <div id="ink"></div>
</header>

<main>
<section class="card">
  <h2>document</h2>
  <div id="drop">
    <div id="placeholder">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 16V4m0 0 4 4m-4-4-4 4"/><path d="M4 16v3a1 1 0 0 0 1 1h14a1 1 0 0 0 1-1v-3"/></svg>
      drop files here<br>or click to choose
    </div>
    <div id="paper" class="bare" hidden>
      <img id="preview" alt="">
      <div id="copies-badge" hidden></div>
    </div>
    <div id="effective" hidden></div>
    <div id="caption" hidden></div>
  </div>
  <div id="chips"></div>
  <input type="file" id="file" hidden multiple
         accept=".pdf,.jpg,.jpeg,.png,.tif,.tiff,.txt,.heic,.heif">
</section>

<section class="card col">
  <h2>settings</h2>
  <div class="grid2">
    <div>
      <label for="queue">queue</label>
      <select id="queue"></select>
    </div>
    <div>
      <label for="copies">copies</label>
      <input id="copies" type="number" min="1" max="99" value="1">
    </div>
    <div>
      <label for="media">paper size</label>
      <select id="media">
        <option value="">preset default</option>
      </select>
    </div>
    <div>
      <label for="MediaType">paper type</label>
      <select id="MediaType">
        <option value="">preset default</option>
      </select>
    </div>
    <div>
      <label for="orientation-requested">orientation</label>
      <select id="orientation-requested">
        <option value="">auto</option>
        <option value="3">portrait</option>
        <option value="4">landscape</option>
      </select>
    </div>
    <div>
      <label for="page-ranges">pages (PDF)</label>
      <input id="page-ranges" placeholder="all, e.g. 1-3,5" inputmode="numeric">
    </div>
    <div>
      <label for="print-quality">quality</label>
      <select id="print-quality">
        <option value="">preset default</option>
        <option value="3">draft</option>
        <option value="4">normal</option>
        <option value="5">best</option>
      </select>
    </div>
    <div>
      <label for="print-color-mode">color</label>
      <select id="print-color-mode">
        <option value="">preset default</option>
        <option value="color">color</option>
        <option value="monochrome">black &amp; white</option>
      </select>
    </div>
    <div>
      <label for="sides">sides</label>
      <select id="sides">
        <option value="">preset default</option>
        <option value="one-sided">one-sided</option>
        <option value="two-sided-long-edge">two-sided (long edge)</option>
        <option value="two-sided-short-edge">two-sided (short edge)</option>
      </select>
    </div>
    <div>
      <label for="fit-to-page">scaling</label>
      <select id="fit-to-page">
        <option value="">as-is</option>
        <option value="true">fit to page</option>
      </select>
    </div>
  </div>
  <details class="opts" id="advanced" hidden>
    <summary>all printer options</summary>
    <div class="grid2" id="adv-grid"></div>
  </details>
  <div>
    <label for="profile">color profile (images only, previewed live)</label>
    <select id="profile">
      <option value="">off (print as-is)</option>
      <option value="vivid">vivid — AirPrint-like</option>
      <option value="punch">punch — max saturation</option>
      <option value="warm">warm — slight warm cast</option>
      <option value="soft">soft — gentle lift</option>
      <option value="bw">black &amp; white</option>
      <option value="icc" id="icc-opt" hidden>ICC gamut-mapped (printer profile)</option>
    </select>
  </div>

  <button id="go" class="primary" disabled>print</button>
  <div id="status"></div>
</section>
</main>

<section class="card" id="jobsCard" hidden>
  <h2>active jobs</h2>
  <ul class="plain" id="jobs"></ul>
</section>

<details class="card" id="histCard">
  <summary>recent prints</summary>
  <ul class="plain" id="hist"></ul>
</details>

<script>
const $ = id => document.getElementById(id);
const drop = $("drop"), fileInput = $("file"), go = $("go"), status = $("status");
const queueSel = $("queue"), profileSel = $("profile");

const OPTION_KEYS = ["media", "MediaType", "sides", "print-quality",
  "print-color-mode", "fit-to-page", "orientation-requested"];
const VALUE_LABELS = {
  "print-quality": { "3": "draft", "4": "normal", "5": "best" },
  "orientation-requested": { "3": "portrait", "4": "landscape" },
};
const MEDIA_LABELS = {
  "Com.canon.mtgr": "Photo Paper Plus Glossy II",
  "Com.canon.mtluster": "Photo Paper Pro Luster",
  "Com.canon.mtsemisuper": "Photo Paper Plus Semi-gloss",
  "Com.canon.mtglossy": "Glossy Photo Paper",
  "Com.canon.mtmat": "Matte Photo Paper",
  "Com.canon.mthires": "High Resolution Paper",
  "Com.canon.mtcardstock": "cardstock",
  "Com.canon.mtgreeting": "greeting card",
  "Com.canon.mtinkjet": "inkjet paper",
  "Com.canon.mtinkjeta": "inkjet paper (A)",
  "Com.canon.mthagaki": "Hagaki",
  "Com.canon.mthagakia": "Hagaki (A)",
  "Com.canon.mthagakiglossy": "Hagaki glossy",
  "Com.canon.mthagakiglossya": "Hagaki glossy (A)",
  "Stationery": "plain paper",
  "Envelope": "envelope",
  "Photographic": "photo (generic)",
  "Auto": "auto",
  // canon cnijfilter2 PPD keywords (photo-canon queue)
  "plain": "plain paper",
  "glossygold": "Photo Paper Plus Glossy II",
  "luster": "Photo Paper Pro Luster",
  "semigloss": "Photo Paper Plus Semi-gloss",
  "glossypaper": "Glossy Photo Paper",
  "matte": "Matte Photo Paper",
  "photopaper": "photo paper (other)",
  "highres": "High Resolution Paper",
  "envelope": "envelope",
  "ijpostcard": "Ink Jet Hagaki",
  "postcard": "Hagaki",
  "greetingcard": "greeting card",
  "cardstock": "cardstock / heavy paper",
};
// mm, portrait; used only to draw the paper frame around the preview
const MEDIA_DIMS = {
  "A4": [210, 297], "A5": [148, 210], "Letter": [216, 279],
  "4x6": [102, 152], "5x7": [127, 178],
};
const PAGE_LABELS = {
  "4x6": "4x6 (10x15)", "4x6.Borderless": "4x6 borderless",
  "5x7": "5x7 (13x18)", "5x7.Borderless": "5x7 borderless",
  "A4.Borderless": "A4 borderless", "Custom.WIDTHxHEIGHT": "custom",
};
// groups already covered by the main controls
const ADV_SKIP = new Set(["PageSize", "MediaType", "cupsPrintQuality",
  "ColorModel", "Duplex"]);

let files = [], selected = -1, queueDefaults = {};
// original raster size + density of the server preview: drives the
// "as-is" physical-size rendering on the paper frame
let previewMeta = { w: 0, h: 0, dpi: 0 };

function isImage(f) {
  return f.type.startsWith("image/") || /\.(heic|heif)$/i.test(f.name);
}
function isPdf(f) {
  return f.type === "application/pdf" || /\.pdf$/i.test(f.name);
}
function mb(n) { return (n / 1024 / 1024).toFixed(1) + " MB"; }
// what will actually print: explicit choice, else the queue preset
function effective(k) { return $(k).value || queueDefaults[k] || ""; }
function debounce(fn, ms) {
  let t; return (...a) => { clearTimeout(t); t = setTimeout(() => fn(...a), ms); };
}

// ---- queues / defaults -------------------------------------------------

fetch("/queues").then(r => r.json()).then(qs => {
  qs.forEach(q => queueSel.add(new Option(q, q)));
  if (qs.length === 0) show("no queues found on the cups server", true);
  else loadDefaults();
});
queueSel.addEventListener("change", loadDefaults);

function friendly(key, value) {
  const sel = $(key);
  const opt = sel && [...sel.options].find(o => o.value === value);
  if (opt && opt.value) return opt.textContent;
  return (VALUE_LABELS[key] || {})[value] || MEDIA_LABELS[value]
    || PAGE_LABELS[value] || value;
}

async function loadDefaults() {
  if (!queueSel.value) return;
  let info = { defaults: {}, media_types: [] };
  try { info = await (await fetch("/queue/" + encodeURIComponent(queueSel.value))).json(); }
  catch (e) { /* labels just stay generic */ }

  // rebuild paper sizes/types from what the queue actually supports
  const groups = info.options || [];
  const mt = $("MediaType");
  while (mt.options.length > 1) mt.remove(1);
  (info.media_types || []).forEach(v =>
    mt.add(new Option(MEDIA_LABELS[v] || v, v)));

  const sizes = (groups.find(g => g.key === "PageSize") || {}).choices || [];
  const media = $("media");
  const keepMedia = media.value;
  while (media.options.length > 1) media.remove(1);
  sizes.forEach(v => media.add(new Option(PAGE_LABELS[v] || v, v)));
  if ([...media.options].some(o => o.value === keepMedia)) media.value = keepMedia;

  buildAdvanced(groups);

  // icc gamut-mapping only offered when a printer profile is mounted
  $("icc-opt").hidden = !info.icc;
  if (!info.icc && profileSel.value === "icc") profileSel.value = "";

  queueDefaults = info.defaults || {};
  for (const k of OPTION_KEYS) {
    const first = $(k).options[0];
    if (!first.dataset.base) first.dataset.base = first.textContent;
    first.textContent = queueDefaults[k]
      ? first.dataset.base + " (" + friendly(k, queueDefaults[k]) + ")"
      : first.dataset.base;
  }
  applyLayout();
  updatePreview();
}

// every PPD/IPP option group the queue advertises, minus the ones the
// main controls already cover; values submitted under their real keys
function buildAdvanced(groups) {
  const box = $("adv-grid");
  box.innerHTML = "";
  const shown = groups.filter(g =>
    !ADV_SKIP.has(g.key) && g.choices.length > 1);
  $("advanced").hidden = shown.length === 0;
  shown.forEach(g => {
    const wrap = document.createElement("div");
    const label = document.createElement("label");
    label.textContent = g.label;
    label.htmlFor = "adv-" + g.key;
    const sel = document.createElement("select");
    sel.id = "adv-" + g.key;
    sel.dataset.key = g.key;
    sel.add(new Option(g.default ? `default (${g.default})` : "default", ""));
    g.choices.forEach(c => sel.add(new Option(c, c)));
    wrap.append(label, sel);
    box.appendChild(wrap);
  });
}

function advancedValues() {
  const out = {};
  document.querySelectorAll("#adv-grid select").forEach(s => {
    if (s.value) out[s.dataset.key] = s.value;
  });
  return out;
}

// ---- file handling -----------------------------------------------------

function addFiles(list) {
  for (const f of list) files.push(f);
  if (files.length) selectFile(files.length - 1);
  render();
}

function removeFile(i) {
  files.splice(i, 1);
  if (selected >= files.length) selected = files.length - 1;
  render();
  updatePreview();
}

function selectFile(i) {
  selected = i;
  render();
  updatePreview();
}

function render() {
  drop.classList.toggle("hasfile", files.length > 0);
  go.disabled = files.length === 0;
  $("placeholder").hidden = files.length > 0;
  $("paper").hidden = files.length === 0;
  $("caption").hidden = files.length === 0;
  $("effective").hidden = files.length === 0;

  const chips = $("chips");
  chips.innerHTML = "";
  files.forEach((f, i) => {
    const c = document.createElement("div");
    c.className = "chip" + (i === selected ? " sel" : "");
    const name = document.createElement("span");
    name.textContent = f.name;
    const x = document.createElement("b");
    x.textContent = "✕";
    x.title = "remove";
    x.onclick = e => { e.stopPropagation(); removeFile(i); };
    c.append(name, x);
    c.onclick = () => selectFile(i);
    chips.appendChild(c);
  });
  if (files.length) {
    const add = document.createElement("div");
    add.className = "chip";
    add.textContent = "+ add";
    add.onclick = () => fileInput.click();
    chips.appendChild(add);
  }

  // profiles are raster ops: images only
  const sel = files[selected];
  const notImage = sel && !isImage(sel);
  profileSel.disabled = !!notImage;
  profileSel.title = notImage ? "color profiles apply to images only" : "";
}

drop.addEventListener("click", () => { if (!files.length) fileInput.click(); });
$("chips").addEventListener("click", e => e.stopPropagation());
fileInput.addEventListener("change", () => { addFiles(fileInput.files); fileInput.value = ""; });
["dragover", "dragenter"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => addFiles(e.dataTransfer.files));

// ---- preview: renders exactly what the selected options will print --------

let previewSeq = 0;

async function updatePreview() {
  const img = $("preview"), cap = $("caption");
  const f = files[selected];
  previewMeta = { w: 0, h: 0, dpi: 0 };
  updateBadges();
  if (!f) { img.removeAttribute("src"); return; }

  cap.textContent = f.name + " (" + mb(f.size) + ")";

  if (!isImage(f) && !isPdf(f)) {
    img.removeAttribute("src");
    $("paper").hidden = true;
    $("effective").hidden = true;
    cap.textContent = "📄 " + cap.textContent;
    return;
  }
  $("paper").hidden = false;

  // instant local thumbnail while the server renders (heic: browser can't)
  if (isImage(f) && !/\.(heic|heif)$/i.test(f.name) && !img.src) {
    const url = URL.createObjectURL(f);
    img.onload = () => URL.revokeObjectURL(url);
    img.src = url;
  }
  applyLayout();

  // server renders through the real pillow pipeline: profile ops,
  // monochrome, the PDF page that will print, soft-proof if ICC mounted
  const seq = ++previewSeq;
  const fd = new FormData();
  fd.append("file", f);
  fd.append("profile", isImage(f) ? profileSel.value : "");
  fd.append("print-color-mode", effective("print-color-mode"));
  if (isPdf(f)) fd.append("page-ranges", $("page-ranges").value.replace(/\s/g, ""));
  try {
    const r = await fetch("/preview", { method: "POST", body: fd });
    if (!r.ok || seq !== previewSeq) return;
    const [pw, ph] = (r.headers.get("X-Image-Px") || "").split("x").map(Number);
    previewMeta = {
      w: pw || 0, h: ph || 0,
      dpi: Number(r.headers.get("X-Image-DPI")) || 0,
    };
    const url = URL.createObjectURL(await r.blob());
    img.onload = () => { URL.revokeObjectURL(url); applyLayout(); };
    img.src = url;
    const proofed = r.headers.get("X-Soft-Proof") === "1";
    cap.textContent = f.name + " (" + mb(f.size) + ")" + (proofed ? " · soft-proofed" : "");
  } catch (e) { /* keep the local thumbnail */ }
}
const updatePreviewSoon = debounce(updatePreview, 400);
profileSel.addEventListener("change", updatePreview);
$("print-color-mode").addEventListener("change", updatePreview);
$("page-ranges").addEventListener("input", () => {
  if (files[selected] && isPdf(files[selected])) updatePreviewSoon();
});

// copies badge + effective-settings chips under the preview
function updateBadges() {
  const badge = $("copies-badge");
  const n = parseInt($("copies").value, 10) || 1;
  badge.hidden = n < 2;
  badge.textContent = "×" + n;

  const box = $("effective");
  box.innerHTML = "";
  if (!files[selected]) return;
  const parts = [];
  const media = effective("media");
  if (media) parts.push(friendly("media", media));
  const mt = effective("MediaType");
  if (mt) parts.push(MEDIA_LABELS[mt] || mt);
  const q = effective("print-quality");
  if (q) parts.push(VALUE_LABELS["print-quality"][q] || q);
  parts.push(effective("print-color-mode") === "monochrome" ? "b&w" : "color");
  const sides = effective("sides");
  if (sides.startsWith("two")) parts.push("two-sided");
  parts.push(effective("fit-to-page") ? "fit to page" : "as-is");
  parts.forEach(p => {
    const s = document.createElement("span");
    s.textContent = p;
    box.appendChild(s);
  });
}
$("copies").addEventListener("input", updateBadges);
["MediaType", "print-quality", "sides"].forEach(id =>
  $(id).addEventListener("change", updateBadges));

// draw the paper frame: media aspect ratio, margins unless borderless,
// and the document at its true physical size when scaling is "as-is"
function applyLayout() {
  const paper = $("paper"), img = $("preview");
  const mediaVal = effective("media");
  const base = mediaVal.split(".")[0];
  const dims = MEDIA_DIMS[base];
  updateBadges();
  img.style.width = img.style.height = "";
  if (!dims || !files[selected]) {
    paper.className = "bare";
    paper.style.aspectRatio = paper.style.width = "";
    return;
  }

  let [w, h] = dims;
  const orient = effective("orientation-requested");
  if (orient === "4") [w, h] = [h, w];
  else if (!orient && img.naturalWidth > img.naturalHeight) [w, h] = [h, w];

  paper.className = "";
  paper.style.aspectRatio = w + " / " + h;
  paper.style.width = (300 * w / h) + "px";
  const borderless = /\.Borderless/i.test(mediaVal);
  paper.style.setProperty("--m", borderless ? "0px" : "4%");

  // as-is: physical size (px / dpi) relative to the printable area;
  // anything bigger than the page is scaled down to fit, like the filters do
  if (!effective("fit-to-page") && previewMeta.dpi && previewMeta.w) {
    const frac = borderless ? 1 : 0.92;
    let relW = (previewMeta.w / previewMeta.dpi) / (w * frac / 25.4);
    let relH = (previewMeta.h / previewMeta.dpi) / (h * frac / 25.4);
    const over = Math.max(relW, relH);
    if (over > 1) { relW /= over; relH /= over; }
    img.style.width = (relW * 100) + "%";
    img.style.height = (relH * 100) + "%";
  }
}
["media", "orientation-requested", "fit-to-page"].forEach(id =>
  $(id).addEventListener("change", applyLayout));

// ---- printing ------------------------------------------------------------

function show(msg, err) {
  status.textContent = msg;
  status.className = err ? "err" : "ok";
}

go.addEventListener("click", async () => {
  if (!files.length) return;
  go.disabled = true;
  const batch = [...files], errors = [];

  for (let i = 0; i < batch.length; i++) {
    const f = batch[i];
    show(`sending ${i + 1}/${batch.length}: ${f.name}…`);
    const fd = new FormData();
    fd.append("file", f);
    fd.append("queue", queueSel.value);
    fd.append("copies", $("copies").value);
    for (const k of OPTION_KEYS) fd.append(k, $(k).value);
    for (const [k, v] of Object.entries(advancedValues())) fd.append(k, v);
    if (isPdf(f)) fd.append("page-ranges", $("page-ranges").value.replace(/\s/g, ""));
    if (isImage(f) && profileSel.value) fd.append("profile", profileSel.value);

    try {
      const r = await fetch("/print", { method: "POST", body: fd });
      const j = await r.json();
      if (!j.ok) errors.push(f.name + ": " + (j.error || "failed"));
    } catch (e) {
      errors.push(f.name + ": network error");
    }
  }

  if (errors.length) show(errors.join("\n"), true);
  else {
    show(`✓ sent ${batch.length} file${batch.length > 1 ? "s" : ""}`);
    files = []; selected = -1; render(); updatePreview();
  }
  go.disabled = files.length === 0;
  loadJobs();
  loadHistory();
});

// ---- active jobs -----------------------------------------------------------

async function loadJobs() {
  let jobs = [];
  try { jobs = await (await fetch("/jobs")).json(); } catch (e) { return; }
  $("jobsCard").hidden = jobs.length === 0;
  const ul = $("jobs");
  ul.innerHTML = "";
  jobs.forEach(j => {
    const li = document.createElement("li");
    const id = document.createElement("span");
    id.className = "grow mono";
    id.textContent = j.id;
    const meta = document.createElement("span");
    meta.className = "dim";
    meta.textContent = mb(j.size) + (j.when ? " · " + j.when : "");
    const btn = document.createElement("button");
    btn.className = "danger";
    btn.textContent = "cancel";
    btn.onclick = async () => {
      btn.disabled = true;
      await fetch("/cancel/" + encodeURIComponent(j.id), { method: "POST" });
      loadJobs();
    };
    li.append(id, meta, btn);
    ul.appendChild(li);
  });
}
loadJobs();
setInterval(() => { if (!document.hidden) loadJobs(); }, 5000);

// ---- ink levels -----------------------------------------------------------

async function loadInk() {
  let marks = [];
  try { marks = await (await fetch("/ink")).json(); } catch (e) { return; }
  const box = $("ink");
  box.innerHTML = "";
  marks.forEach(m => {
    const pill = document.createElement("span");
    pill.className = "pill" + (m.level < 15 ? " low" : "");
    const dot = document.createElement("i");
    const color = /^#[0-9a-f]{6}$/i.test(m.color) ? m.color : "#888";
    dot.style.setProperty("--c", color);
    // fill the pill background to the ink level
    pill.style.background = `linear-gradient(90deg,
      color-mix(in srgb, ${color} 22%, var(--card)) ${m.level}%,
      var(--card) ${m.level}%)`;
    pill.append(dot, `${m.name} ${m.level}%`);
    box.appendChild(pill);
  });
}
loadInk();
setInterval(() => { if (!document.hidden) loadInk(); }, 5 * 60 * 1000);

// ---- history ---------------------------------------------------------------

function summarize(e) {
  const parts = [e.queue];
  if (e.copies > 1) parts.push(e.copies + "×");
  for (const [k, v] of Object.entries(e.options || {}))
    parts.push(friendly(k, v).replace(/ \(.*\)$/, ""));
  if (e.profile) parts.push(e.profile);
  return parts.join(" · ");
}

async function loadHistory() {
  let entries = [];
  try { entries = await (await fetch("/history")).json(); } catch (e) { return; }
  const ul = $("hist");
  ul.innerHTML = "";
  if (!entries.length) {
    const li = document.createElement("li");
    li.className = "empty";
    li.textContent = "nothing printed yet";
    ul.appendChild(li);
    return;
  }
  entries.forEach(e => {
    const li = document.createElement("li");
    const name = document.createElement("span");
    name.className = "grow";
    name.textContent = e.file;
    name.title = e.file;
    const meta = document.createElement("span");
    meta.className = "dim";
    meta.textContent = summarize(e) + " · "
      + new Date(e.ts * 1000).toLocaleString(undefined,
          { month: "short", day: "numeric", hour: "2-digit", minute: "2-digit" });
    const btn = document.createElement("button");
    btn.textContent = "use settings";
    btn.onclick = () => applySettings(e);
    li.append(name, meta, btn);
    ul.appendChild(li);
  });
}

async function applySettings(e) {
  if ([...queueSel.options].some(o => o.value === e.queue)) {
    queueSel.value = e.queue;
    await loadDefaults();
  }
  $("copies").value = e.copies || 1;
  for (const k of OPTION_KEYS) $(k).value = (e.options || {})[k] || "";
  document.querySelectorAll("#adv-grid select").forEach(s => {
    s.value = (e.options || {})[s.dataset.key] || "";
  });
  $("page-ranges").value = (e.options || {})["page-ranges"] || "";
  profileSel.value = e.profile || "";
  applyLayout();
  updatePreview();
  show("settings restored from " + e.file);
}
loadHistory();
</script>

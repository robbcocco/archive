<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>print</title>
<style>
  :root { color-scheme: light dark; }
  * { box-sizing: border-box; }
  body {
    font-family: -apple-system, system-ui, sans-serif;
    max-width: 26rem; margin: 3rem auto; padding: 0 1rem;
    display: flex; flex-direction: column; gap: 1rem;
  }
  h1 { font-size: 1.2rem; margin: 0; }
  #drop {
    border: 2px dashed #8888; border-radius: 12px;
    padding: 2.5rem 1rem; text-align: center; cursor: pointer;
    transition: border-color .15s, background .15s;
  }
  #drop.over { border-color: #4a9eff; background: #4a9eff22; }
  #drop.hasfile { border-style: solid; border-color: #3c3; padding: .8rem; }
  #drop img, #drop embed {
    max-width: 100%; max-height: 240px; border-radius: 6px; display: block;
    margin: 0 auto; transition: transform .2s;
  }
  #drop img.rot { transform: rotate(90deg); max-height: 200px; }
  #drop embed { width: 100%; height: 240px; }
  #drop figcaption {
    font-size: .8rem; opacity: .7; margin-top: .4rem; word-break: break-all;
  }
  select, input, button {
    font: inherit; padding: .5rem .6rem; border-radius: 8px;
    border: 1px solid #8886; width: 100%;
  }
  label { font-size: .8rem; opacity: .7; display: block; margin-bottom: .2rem; }
  .row { display: flex; gap: .6rem; }
  .row > div { flex: 1; }
  details { border: 1px solid #8884; border-radius: 8px; padding: .6rem; }
  details > div { display: flex; flex-direction: column; gap: .6rem; margin-top: .6rem; }
  button {
    background: #4a9eff; color: white; border: none; cursor: pointer;
    padding: .7rem; font-weight: 600;
  }
  button:disabled { opacity: .4; cursor: default; }
  #status { min-height: 1.2rem; font-size: .9rem; white-space: pre-wrap; }
  #status.err { color: #e55; }
  #status.ok { color: #3a3; }
</style>
</head>
<body>
<h1>🖨 print</h1>

<div id="drop">drop a file here<br>or click to choose</div>
<input type="file" id="file" hidden accept=".pdf,.jpg,.jpeg,.png,.tif,.tiff,.txt">

<div class="row">
  <div>
    <label for="queue">queue</label>
    <select id="queue"></select>
  </div>
  <div>
    <label for="copies">copies</label>
    <input id="copies" type="number" min="1" max="99" value="1">
  </div>
  <div>
    <label for="orientation-requested">orientation</label>
    <select id="orientation-requested">
      <option value="">auto</option>
      <option value="3">portrait</option>
      <option value="4">landscape</option>
    </select>
  </div>
</div>

<details>
  <summary>options (queue preset applies unless overridden)</summary>
  <div>
    <div>
      <label for="media">paper size</label>
      <select id="media">
        <option value="">preset default</option>
        <option>A4</option>
        <option>A5</option>
        <option>Letter</option>
        <option value="4x6">4x6 (10x15)</option>
        <option value="4x6.Borderless">4x6 borderless</option>
        <option value="5x7">5x7 (13x18)</option>
      </select>
    </div>
    <div>
      <label for="MediaType">paper type</label>
      <select id="MediaType">
        <option value="">preset default</option>
      </select>
    </div>
    <div>
      <label for="sides">sides</label>
      <select id="sides">
        <option value="">preset default</option>
        <option value="one-sided">one-sided</option>
        <option value="two-sided-long-edge">two-sided (long edge)</option>
        <option value="two-sided-short-edge">two-sided (short edge)</option>
      </select>
    </div>
    <div>
      <label for="print-quality">quality</label>
      <select id="print-quality">
        <option value="">preset default</option>
        <option value="3">draft</option>
        <option value="4">normal</option>
        <option value="5">best</option>
      </select>
    </div>
    <div>
      <label for="print-color-mode">color</label>
      <select id="print-color-mode">
        <option value="">preset default</option>
        <option value="color">color</option>
        <option value="monochrome">black &amp; white</option>
      </select>
    </div>
    <div>
      <label for="fit-to-page">scaling</label>
      <select id="fit-to-page">
        <option value="">as-is</option>
        <option value="true">fit to page</option>
      </select>
    </div>
    <div>
      <label for="profile">color profile (images only, previewed live)</label>
      <select id="profile">
        <option value="">off (print as-is)</option>
        <option value="vivid">vivid — AirPrint-like</option>
        <option value="punch">punch — max saturation</option>
        <option value="warm">warm — slight warm cast</option>
        <option value="soft">soft — gentle lift</option>
        <option value="bw">black &amp; white</option>
        <option value="icc" id="icc-opt" hidden>ICC gamut-mapped (printer profile)</option>
      </select>
    </div>
  </div>
</details>

<button id="go" disabled>print</button>
<div id="status"></div>

<script>
const drop = document.getElementById("drop");
const fileInput = document.getElementById("file");
const go = document.getElementById("go");
const status = document.getElementById("status");
let file = null;

const OPTION_KEYS = ["media", "MediaType", "sides", "print-quality", "print-color-mode", "fit-to-page", "orientation-requested"];
const VALUE_LABELS = {
  "print-quality": { "3": "draft", "4": "normal", "5": "best" },
  "orientation-requested": { "3": "portrait", "4": "landscape" },
};
const MEDIA_LABELS = {
  "Com.canon.mtgr": "Photo Paper Plus Glossy II",
  "Com.canon.mtluster": "Photo Paper Pro Luster",
  "Com.canon.mtsemisuper": "Photo Paper Plus Semi-gloss",
  "Com.canon.mtglossy": "Glossy Photo Paper",
  "Com.canon.mtmat": "Matte Photo Paper",
  "Com.canon.mthires": "High Resolution Paper",
  "Com.canon.mtcardstock": "cardstock",
  "Com.canon.mtgreeting": "greeting card",
  "Com.canon.mtinkjet": "inkjet paper",
  "Com.canon.mtinkjeta": "inkjet paper (A)",
  "Com.canon.mthagaki": "Hagaki",
  "Com.canon.mthagakia": "Hagaki (A)",
  "Com.canon.mthagakiglossy": "Hagaki glossy",
  "Com.canon.mthagakiglossya": "Hagaki glossy (A)",
  "Stationery": "plain paper",
  "Envelope": "envelope",
  "Photographic": "photo (generic)",
  "Auto": "auto",
  // canon cnijfilter2 PPD keywords (photo-canon queue)
  "plain": "plain paper",
  "glossygold": "Photo Paper Plus Glossy II",
  "luster": "Photo Paper Pro Luster",
  "semigloss": "Photo Paper Plus Semi-gloss",
  "glossypaper": "Glossy Photo Paper",
  "matte": "Matte Photo Paper",
  "photopaper": "photo paper (other)",
  "highres": "High Resolution Paper",
  "envelope": "envelope",
  "ijpostcard": "Ink Jet Hagaki",
  "postcard": "Hagaki",
  "greetingcard": "greeting card",
  "card": "cardstock",
};
const queueSel = document.getElementById("queue");

fetch("/queues").then(r => r.json()).then(qs => {
  qs.forEach(q => queueSel.add(new Option(q, q)));
  if (qs.length === 0) show("no queues found on the cups server", true);
  else loadDefaults();
});
queueSel.addEventListener("change", loadDefaults);

function friendly(key, value) {
  const sel = document.getElementById(key);
  const opt = [...sel.options].find(o => o.value === value);
  if (opt) return opt.textContent;
  return (VALUE_LABELS[key] || {})[value] || value;
}

async function loadDefaults() {
  if (!queueSel.value) return;
  let info = { defaults: {}, media_types: [] };
  try { info = await (await fetch("/queue/" + encodeURIComponent(queueSel.value))).json(); }
  catch (e) { /* labels just stay generic */ }

  // rebuild paper types from what the queue actually supports
  const mt = document.getElementById("MediaType");
  while (mt.options.length > 1) mt.remove(1);
  (info.media_types || []).forEach(v =>
    mt.add(new Option(MEDIA_LABELS[v] || v, v)));

  // icc gamut-mapping only offered when a printer profile is mounted
  const iccOpt = document.getElementById("icc-opt");
  iccOpt.hidden = !info.icc;
  if (!info.icc && profileSel.value === "icc") profileSel.value = "";

  const defs = info.defaults || {};
  for (const k of OPTION_KEYS) {
    const first = document.getElementById(k).options[0];
    if (!first.dataset.base) first.dataset.base = first.textContent;
    first.textContent = defs[k]
      ? first.dataset.base + " (" + friendly(k, defs[k]) + ")"
      : first.dataset.base;
  }
}

let previewUrl = null;

function setFile(f) {
  file = f;
  if (previewUrl) { URL.revokeObjectURL(previewUrl); previewUrl = null; }
  drop.classList.toggle("hasfile", !!f);
  go.disabled = !f;
  show("");

  if (!f) {
    drop.innerHTML = "drop a file here<br>or click to choose";
    return;
  }
  drop.textContent = "";
  const fig = document.createElement("figure");
  fig.style.margin = 0;
  if (f.type.startsWith("image/")) {
    previewUrl = URL.createObjectURL(f);
    const img = document.createElement("img");
    img.src = previewUrl;
    fig.appendChild(img);
  } else if (f.type === "application/pdf") {
    previewUrl = URL.createObjectURL(f);
    const emb = document.createElement("embed");
    emb.src = previewUrl + "#toolbar=0";
    emb.type = "application/pdf";
    fig.appendChild(emb);
  }
  const cap = document.createElement("figcaption");
  cap.textContent = f.name + " (" + (f.size / 1024 / 1024).toFixed(1) + " MB)";
  fig.appendChild(cap);
  drop.appendChild(fig);
  applyOrientation();
  applyProfilePreview();
}

drop.addEventListener("click", () => fileInput.click());
fileInput.addEventListener("change", () => setFile(fileInput.files[0]));
["dragover", "dragenter"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.add("over"); }));
["dragleave", "drop"].forEach(ev =>
  drop.addEventListener(ev, e => { e.preventDefault(); drop.classList.remove("over"); }));
drop.addEventListener("drop", e => setFile(e.dataTransfer.files[0]));

// rotate the thumbnail so the preview matches the chosen orientation
const orientSel = document.getElementById("orientation-requested");
function applyOrientation() {
  const img = drop.querySelector("img");
  if (img) img.classList.toggle("rot", orientSel.value === "4");
}
orientSel.addEventListener("change", applyOrientation);

// ask the server to render the preview through the real pillow pipeline
// (and soft-proof it when a printer ICC profile is mounted)
const profileSel = document.getElementById("profile");
let previewSeq = 0;
async function applyProfilePreview() {
  const img = drop.querySelector("img");
  if (!img || !file || !file.type.startsWith("image/")) return;
  const seq = ++previewSeq;
  const fd = new FormData();
  fd.append("file", file);
  fd.append("profile", profileSel.value);
  try {
    const r = await fetch("/preview", { method: "POST", body: fd });
    if (!r.ok || seq !== previewSeq) return;
    const url = URL.createObjectURL(await r.blob());
    img.onload = () => URL.revokeObjectURL(url);
    img.src = url;
    const cap = drop.querySelector("figcaption");
    if (cap) {
      const proofed = r.headers.get("X-Soft-Proof") === "1";
      cap.textContent = cap.textContent.replace(/ · soft-proofed$/, "")
        + (proofed ? " · soft-proofed" : "");
    }
  } catch (e) { /* keep the raw thumbnail */ }
}
profileSel.addEventListener("change", applyProfilePreview);

function show(msg, err) {
  status.textContent = msg;
  status.className = err ? "err" : "ok";
}

go.addEventListener("click", async () => {
  if (!file) return;
  const fd = new FormData();
  fd.append("file", file);
  fd.append("queue", document.getElementById("queue").value);
  fd.append("copies", document.getElementById("copies").value);
  for (const k of ["media", "MediaType", "sides", "print-quality", "print-color-mode", "fit-to-page", "orientation-requested"])
    fd.append(k, document.getElementById(k).value);
  // profiles are raster operations, only meaningful for images
  if (file.type.startsWith("image/") && profileSel.value)
    fd.append("profile", profileSel.value);

  go.disabled = true;
  show("sending…");
  try {
    const r = await fetch("/print", { method: "POST", body: fd });
    const j = await r.json();
    if (j.ok) { show("✓ " + j.message); setFile(null); }
    else show(j.error || "failed", true);
  } catch (e) {
    show("network error: " + e, true);
  }
  go.disabled = !file;
});
</script>
</body>
</html>

services:

  radarr:
    image: lscr.io/linuxserver/radarr:latest
    container_name: radarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${RADARR_PORT}:7878
    networks:
      - media
    # dns:
    #   - 9.9.9.10
    #   - 149.112.112.10
    volumes:
      - ${CONFIG_DIR}/.radarr:/config
      - ${DOWNLOADS_DIR}:/downloads
      - ${MOVIES_DIR}:/movies
    restart: unless-stopped

  sonarr:
    image: lscr.io/linuxserver/sonarr:latest
    container_name: sonarr
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    ports:
      - ${SONARR_PORT}:8989
    networks:
      - media
    # dns:
    #   - 9.9.9.10
    #   - 149.112.112.10
    volumes:
      - ${CONFIG_DIR}/.sonarr:/config
      - ${DOWNLOADS_DIR}:/downloads
      - ${SHOWS_DIR}:/tvshows
      - ${ANIMATION_DIR}:/animation
    restart: unless-stopped

  lidarr:
    image: ghcr.io/hotio/lidarr:pr-plugins
    container_name: lidarr
    entrypoint: /bin/sh -c "apk add --no-cache ffmpeg && exec /init"
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_DIR}/.lidarr:/config
      - ${MUSIC_DIR}:/music
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${LIDARR_PORT}:8686
    networks:
      - media
    # dns:
    #   - 9.9.9.10
    #   - 149.112.112.10
    restart: unless-stopped

  mylar3:
    image: lscr.io/linuxserver/mylar3:latest
    container_name: mylar3
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
    volumes:
      - ${CONFIG_DIR}/.mylar3:/config
      - ${COMICS_DIR}:/comics
      - ${DOWNLOADS_DIR}:/downloads
    networks:
      - media
    # dns:
    #   - 9.9.9.10
    #   - 149.112.112.10
    ports:
      - ${MYLAR3_PORT}:8090
    restart: unless-stopped

  qbittorrent:
    image: lscr.io/linuxserver/qbittorrent:latest
    container_name: qbittorrent
    environment:
      - PUID=${PUID}
      - PGID=${PGID}
      - TZ=${TZ}
      - WEBUI_PORT=8080
      - TORRENTING_PORT=6881
    volumes:
      - ${CONFIG_DIR}/.qbittorrent:/config
      - ${DOWNLOADS_DIR}:/downloads
    ports:
      - ${QBITTORRENT_PORT}:8080
      - 6881:6881
      - 6881:6881/udp
    networks:
      - media
    restart: unless-stopped

  # deluge:

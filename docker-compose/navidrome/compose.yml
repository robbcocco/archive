services:
  navidrome:
    image: deluan/navidrome:latest
    container_name: navidrome
    # navidrome ignores PUID/PGID (linuxserver convention); user: is the supported way
    user: "${PUID}:${PGID}"
    environment:
      - TZ=${TZ}
      - ND_SPOTIFY_ID=${ND_SPOTIFY_ID}
      - ND_SPOTIFY_SECRET=${ND_SPOTIFY_SECRET}
    ports:
      - ${NAVIDROME_PORT}:4533
    volumes:
      - ${CONFIG_DIR}/.navidrome:/data
      - ${MUSIC_DIR}:/music
    restart: unless-stopped

  feishin:
    container_name: feishin
    image: 'ghcr.io/jeffvli/feishin:latest'
    environment:
      - SERVER_NAME=${SERVER_NAME}
      - SERVER_LOCK=true
      - SERVER_TYPE=navidrome
      - SERVER_URL=${SERVER_URL}:${NAVIDROME_PORT}
      - PUID=${PUID}
      - PGID=${PGID}
      - UMASK=${UMASK}
      - TZ=${TZ}
    ports:
        - ${FEISHIN_PORT}:9180
    depends_on:
      - navidrome
    restart: unless-stopped